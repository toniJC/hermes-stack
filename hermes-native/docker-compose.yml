# ~/projects/hermes-native/docker-compose.yml
# Variables come from ./.env (see hermes-docker for reference).

services:
  hermes:
    # Pinned by digest. Override via HERMES_IMAGE in .env to use Dockerfile.fallback.
    image: ${HERMES_IMAGE}
    container_name: hermes-native-agent
    hostname: hermes-native
    init: true
    restart: "no"
    stop_grace_period: 30s
    user: "1000:1000"

    # --- Hardening ---
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    pids_limit: 512
    mem_limit: 4g
    memswap_limit: 4g
    cpus: 4.0

    # --- Networking ---
    # host.docker.internal must resolve to the Docker Desktop gateway so the
    # container can reach host services (MLX :8006, Engram :7437).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # --- Filesystem ---
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=512m
      - /run:rw,noexec,nosuid,size=64m
    volumes:
      - hermes-native-data:/opt/data:rw
      - ./hermes-config/soul.md:/opt/data/SOUL.md:ro
      - ./hermes-config/user-config.yaml:/opt/data/config.yaml:ro
      - ./hermes-config:/hermes-config:ro
      - ${WORKSPACE_PATH:-./projects/miapp}:/workspace:rw

    # --- Runtime env (forwarded into the process) ---
    environment:
      HERMES_CONFIG: /hermes-config/config.yaml
      HERMES_DATA_DIR: /opt/data
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      TZ: ${TZ:-Europe/Madrid}
      PYTHONUNBUFFERED: "1"

    # Interactive: hermes is a CLI tool, not a daemon.
    # Launch sessions with: docker compose run --rm hermes hermes chat
    stdin_open: true
    tty: true

volumes:
  hermes-native-data:
    name: hermes-native-data
    driver: local
