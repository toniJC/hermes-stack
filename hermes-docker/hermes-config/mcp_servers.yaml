# ~/projects/hermes-docker/hermes-config/mcp_servers.yaml
# Mounted read-only at /hermes-config/mcp_servers.yaml inside container.

version: 1

servers:
  engram:
    transport: sse
    url: http://host.docker.internal:7438/sse
    description: "Persistent memory across sessions (Engram)"
    timeout: 30
    enabled: true
    # Tool allow-list (omit `tools:` entirely to expose everything Engram advertises).
    tools:
      - mem_save
      - mem_search
      - mem_context
      - mem_get_observation
      - mem_session_summary
      - mem_save_prompt
      - mem_current_project
      - mem_update
      - mem_suggest_topic_key
      - mem_timeline
      - mem_stats
    headers: {}

  design:
    transport: sse
    url: http://host.docker.internal:8012/sse
    timeout: 30
    enabled: true
    tools:
      - design_search
      - design_search_stack
      - design_system
