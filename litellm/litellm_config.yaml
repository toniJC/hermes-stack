model_list:
  # ── Claude API ──────────────────────────────────────────────
  - model_name: opus
    litellm_params:
      model: anthropic/claude-opus-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  # ── MiniMax M2.7 via Together.ai ────────────────────────────
  - model_name: minimax-orchestrator
    litellm_params:
      model: openai/MiniMaxAI/MiniMax-M2.7
      api_base: https://api.together.xyz/v1
      api_key: os.environ/TOGETHER_API_KEY

  # ── Modelos locales (aliases claude-* para /v1/messages) ───
  - model_name: claude-local-thinking
    litellm_params:
      model: openai//Users/pirito/models/deepseek-r1-32b-mlx
      api_base: http://localhost:8001/v1
      api_key: dummy

  - model_name: local-thinking
    litellm_params:
      model: openai//Users/pirito/models/deepseek-r1-32b-mlx
      api_base: http://localhost:8001/v1
      api_key: dummy
    model_info:
      max_input_tokens: 131072
      max_output_tokens: 8192

  - model_name: local-hermes
    litellm_params:
      model: openai//Users/pirito/models/qwen3.6-27b-8bit
      api_base: http://localhost:8006/v1
      api_key: dummy
    model_info:
      max_input_tokens: 131072
      max_output_tokens: 16384

  - model_name: hermes-orchestrator
    litellm_params:
      model: openai//Users/pirito/models/qwen3.6-27b-8bit
      api_base: http://localhost:8006/v1
      api_key: dummy
    model_info:
      max_input_tokens: 131072
      max_output_tokens: 16384

litellm_settings:
  drop_params: true
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  callbacks: ["skill_injector.skill_injector_instance"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

router_settings:
  fallbacks:
    - local-thinking: [local-hermes]
    - hermes-orchestrator: [minimax-orchestrator]
  num_retries: 2
  retry_after: 5
