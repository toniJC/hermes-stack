# Langfuse v2 self-hosted (Postgres-only). Pinned to v2 major to avoid
# accidental upgrade to v3 (which requires ClickHouse + Redis).
# Server SDK pair: langfuse>=2.60.0,<3.0.0 installed in LiteLLM's mlx_env.
# To pin to an exact minor: replace langfuse/langfuse:2 with langfuse/langfuse:2.93.0

services:
  langfuse-server:
    image: langfuse/langfuse:2  # floating v2 — pin to 2.93.0 if you want immutability
    container_name: langfuse-server
    restart: unless-stopped
    depends_on:
      langfuse-postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"  # bind to loopback only — solo dev box
    environment:
      DATABASE_URL: postgresql://langfuse:${POSTGRES_PASSWORD}@langfuse-postgres:5432/langfuse
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      SALT: ${SALT}
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      # Solo-dev: disable sign-up after first admin user is created
      AUTH_DISABLE_SIGNUP: "false"  # flip to true after initial setup

  langfuse-postgres:
    image: postgres:15-alpine
    container_name: langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  langfuse-postgres-data:
    name: langfuse-postgres-data
    driver: local
